[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --tb=short -q
markers =
    unit: Юнит-тесты (без I/O)
    integration: Интеграционные тесты (БД, сеть)
    api: API-тесты (HTTP-клиент)
    e2e: End-to-end сценарии
    coaching: Тесты модуля коучинга
    slow: Медленные тесты (>1 сек)
    smoke: Smoke-тесты (быстрая проверка)
