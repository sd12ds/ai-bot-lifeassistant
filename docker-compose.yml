# Docker Compose — полный стек ai-assistant
# Сервисы: postgres, migrator, api, bot, scheduler
# Host nginx (SSL/certbot) проксирует /api/ → localhost:8000 → ai_api

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aiassistant}
      POSTGRES_USER: ${POSTGRES_USER:-aiuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"          # доступен с хоста для миграций и отладки
    networks:
      - ai_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Alembic migrator — выполняется один раз перед поднятием сервисов ───────
  migrator:
    build:
      context: .
      dockerfile: api/Dockerfile
    command: alembic upgrade head
    restart: "no"            # однократный запуск, после успеха не перезапускать
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aiuser}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-aiassistant}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai_net

  # ── FastAPI backend ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: ai_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aiuser}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-aiassistant}
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks:
      - ai_net
    ports:
      - "8000:8000"          # host nginx проксирует сюда /api/
    volumes:
      - /var/www/jarvis/uploads:/var/www/jarvis/uploads  # загрузки пользователей

  # ── Telegram-бот (polling + handlers + supervisor) ─────────────────────────
  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: ai_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aiuser}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-aiassistant}
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks:
      - ai_net
    volumes:
      # Полный доступ к /var/www/jarvis: cache-busting для меню + uploads для фото
      - /var/www/jarvis:/var/www/jarvis

  # ── Scheduler — фоновые уведомления, независимы от бота ───────────────────
  scheduler:
    build:
      context: .
      dockerfile: bot/Dockerfile   # те же зависимости, другая точка входа
    container_name: ai_scheduler
    command: ["python", "scheduler_main.py"]
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aiuser}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-aiassistant}
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks:
      - ai_net

volumes:
  postgres_data:

networks:
  ai_net:
    driver: bridge
