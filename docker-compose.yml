# Docker Compose — инфраструктура проекта
# Сервисы: postgres, api (FastAPI), nginx
# Бот запускается отдельно (nohup python main.py) пока не переедет на PostgreSQL

services:

  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aiassistant}
      POSTGRES_USER: ${POSTGRES_USER:-aiuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"          # доступен с хоста для миграций и отладки
    networks:
      - ai_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiuser}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI backend ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: ai_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aiuser}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-aiassistant}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai_net
    ports:
      - "8000:8000"

  # ── nginx — reverse proxy + статика Mini App ───────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ai_nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./miniapp/dist:/usr/share/nginx/html:ro   # статика фронтенда (появится на этапе 2)
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    networks:
      - ai_net

volumes:
  postgres_data:

networks:
  ai_net:
    driver: bridge
