# nginx.conf — reverse proxy для Mini App + FastAPI
# Статика (miniapp/dist) раздаётся как SPA, /api/* проксируется в FastAPI

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Сжатие
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    server {
        listen 80;
        server_name _;

        # ── Mini App — статика ─────────────────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location / {
            # SPA fallback: все маршруты → index.html
            try_files $uri $uri/ /index.html;
        }

        # ── FastAPI — reverse proxy ────────────────────────────────────────
        location /api/ {
            proxy_pass         http://api:8000/api/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # CORS для разработки
            add_header Access-Control-Allow-Origin  *;
            add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, X-Init-Data";

            if ($request_method = OPTIONS) {
                return 204;
            }
        }

        # ── Кеширование статики ────────────────────────────────────────────
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
